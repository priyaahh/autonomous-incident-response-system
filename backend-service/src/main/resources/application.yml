# Spring Server Config
server:
  port: 8081
  servlet:
    context-path: /api/v1

spring:
  application:
    name: airs-backend

  # Postgres Database Profile Configurations
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:airs_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # Hibernate/JPA Settings
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Elasticsearch Client Connections
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    connection-timeout: 10s
    socket-timeout: 30s

# Logging Levels
logging:
  level:
    root: INFO
    com.autosoc.airs: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

# Custom Application Integration Parameters
airs:
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8080}
    timeout-ms: 30000
