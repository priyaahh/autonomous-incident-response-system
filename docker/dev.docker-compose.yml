version: '3.8'

services:
  # ----------------------------------------------------
  # PostgreSQL: Relational storage for Spring Boot
  # ----------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: airs-postgres
    environment:
      POSTGRES_DB: airs_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airs_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airs-network

  # ----------------------------------------------------
  # Elasticsearch: Lexical log indexer
  # ----------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: airs-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cat/health | grep -q green || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - airs-network

  # ----------------------------------------------------
  # ChromaDB: Vector database store for embeddings
  # ----------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: airs-chromadb
    environment:
      - CHROMA_SERVER_NO_TELEMETRY=True
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airs-network

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  chroma_data:
    driver: local

networks:
  airs-network:
    driver: bridge
